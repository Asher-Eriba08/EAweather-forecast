<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <style>
        body {
            background-color: #007BFF; /* Blue background */
            color: white;              /* White text */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin: 5px;
        }

        input {
            width: 200px;
        }

        button {
            background-color: white;
            color: #007BFF;
            cursor: pointer;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        p {
            font-size: 18px;
        }

        h1, h2 {
            margin-bottom: 20px;
        }

        .error {
            color: #ff4c4c;
        }
    </style>
</head>
<body>
    <h1>🌦️ EA Weather </h1>
    <form method="POST">
        <input type="text" name="city" placeholder="Enter city name..." required>
        <button type="submit">Get Weather info</button>
    </form>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if weather %}
        <h2>📍 {{ weather.city }}</h2>
        <p>🕒 Local Time: {{ weather.time }}</p>
        <p>🌤️ Weather: {{ weather.desc }}</p>
        <p>🌡️ Temperature: {{ weather.temp }}°C</p>
        <p>💧 Humidity: {{ weather.humidity }}%</p>
        <p>💨 Wind Speed: {{ weather.wind }} km/h</p>
    {% endif %}
</body>
</html>
